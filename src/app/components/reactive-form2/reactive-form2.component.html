<h1>Reactive form 2</h1>
<div class="row">
  <form (submit)="onSubmit()" [formGroup]="userForm" novalidate>

    <div class="mb-3 col-6">
      <label for="userName" class="form-label">Name: </label>
      <input      
        type="text"
        class="form-control"
        id="userName"
        formControlName="name"  
        placeholder="Name"    
      />
      <div class="alert alert-danger"
        *ngIf="formErrors.name">
        {{formErrors.name}}
      </div>
    </div>

    <div class="mb-3 col-6">
      <label for="password" class="form-label">Password: </label>
      <input
        type="password"
        class="form-control"
        id="password"
        formControlName="password"   
        placeholder="Password"   
      />
      <div class="alert alert-danger"
        *ngIf="formErrors.password">
        {{formErrors.password}}
      </div>
    </div>

    <div class="mb-3 col-6">
      <label for="email" class="form-label">Email: </label>
      <input
        type="email"
        class="form-control"
        id="email"
        formControlName="email" 
        placeholder="Email"     
      />
      <div class="alert alert-danger"
        *ngIf="formErrors.email">
        {{formErrors.email}}
      </div>
    </div>

    <div class="mb-3 col-6">
      <label for="age" class="form-label">Age: </label>
      <input
        type="text"
        class="form-control"
        id="age"
        formControlName="age"   
        placeholder="Age"   
      />
      <div class="alert alert-danger"
        *ngIf="formErrors.age">
        {{formErrors.age}}
      </div>
    </div>

    <div class="mb-3 col-6">
      <label for="role" class="form-label">Role: </label>
      <select        
        class="form-select"
        id="role"
        formControlName="role"      
      >
      <option selected [value]="null" disabled>Choose the role</option>
      <option *ngFor="let role of roles" [value]="role">{{role}}</option>
      </select>
      <div class="alert alert-danger"
        *ngIf="formErrors.role">
        {{formErrors.role}}
      </div>
    </div>


    <button type="submit">Submit</button>

  </form>
</div>
